# This is the AWS CodeBuild specification file
# It defines how to build the Docker image in AWS CodeBuild service
# CodeBuild will automatically build and push to ECR when triggered

version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com
      - REPOSITORY_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_DEFAULT_REGION.amazonaws.com/$IMAGE_REPO_NAME
      - IMAGE_TAG=${CODEBUILD_BUILD_NUMBER:-latest}
      - echo Build started on `date`
      - echo Building the Docker image...

  build:
    commands:
      - echo Build started on `date`
      - echo Building the Docker image...
      - echo "🔍 Environment variables being passed to Docker build:"
      - echo "NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}"
      - echo "NEXT_PUBLIC_SOCKET_URL=${NEXT_PUBLIC_SOCKET_URL}"
      - docker build -t $IMAGE_REPO_NAME:$IMAGE_TAG
        --build-arg NEXT_PUBLIC_API_URL="${NEXT_PUBLIC_API_URL}"
        --build-arg NEXT_PUBLIC_SOCKET_URL="${NEXT_PUBLIC_SOCKET_URL}"
        .
      - docker tag $IMAGE_REPO_NAME:$IMAGE_TAG $REPOSITORY_URI:$IMAGE_TAG
      - docker tag $IMAGE_REPO_NAME:$IMAGE_TAG $REPOSITORY_URI:latest

  post_build:
    commands:
      - echo Build completed on `date`
      - echo Pushing the Docker images...
      - docker push $REPOSITORY_URI:$IMAGE_TAG
      - docker push $REPOSITORY_URI:latest
      - echo Writing image definitions file...
      - printf '[{"name":"app","imageUri":"%s"}]' $REPOSITORY_URI:$IMAGE_TAG > imagedefinitions.json
      - echo $REPOSITORY_URI:$IMAGE_TAG

artifacts:
  files:
    - imagedefinitions.json
  name: BuildArtifact
